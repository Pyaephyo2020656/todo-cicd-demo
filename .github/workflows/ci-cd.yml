name: Full Stack CI
on:
  push:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    # This starts a real MySQL database just for the duration of the test
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: admin
          MYSQL_DATABASE: todo_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and Test Backend
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # This tells the robot exactly where the lock file is!
          cache-dependency-path: './todo-frontend/package-lock.json' 

      - name: Install and Build Frontend
        working-directory: ./todo-frontend
        run: |
          npm install
          npm run build