name: Full Stack CI
on:
  push:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Updated to match your machine
          distribution: 'temurin'
          cache: 'maven' # This makes your builds much faster

      - name: Build and Test Backend
        working-directory: ./backend
        run: |
          chmod +x mvnw
          ./mvnw clean test

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build Frontend
        working-directory: ./todo-frontend
        run: |
          npm ci
          npm run build